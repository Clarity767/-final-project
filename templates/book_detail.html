{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>{{ book.title }}</h1>

    <p><strong>Автор:</strong> {{ book.author }}</p>
    <p><strong>Опис:</strong> {{ book.description }}</p>
    <p><strong>Рік:</strong> {{ book.year }}</p>
    <p><strong>Додано:</strong> {{ book.created_at }}</p>

    {% if book.image_url %}
    <img src="{{ book.image_url }}" width="200">
    {% endif %}

    <br><br>
    <a href="{{ url_for('library') }}">⬅ Назад</a>
</div>
{% endblock %}
